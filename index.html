
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iNViCTUS Green Census — Campus Tree Trail</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Noto+Sans+Gurmukhi:wght@500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  *{ margin:0; padding:0; box-sizing:border-box; }
  :root{
    --ink:#0c2a1d; --green:#0e3d28; --leaf:#4ca771; --leaf2:#86c99a;
    --gold:#d9a441; --red:#c0392b; --paper:#fbfaf4; --muted:#6b8278;
  }
  html{ scroll-behavior:smooth; }
  body{
    font-family:'Inter',-apple-system,'Segoe UI',sans-serif; color:var(--ink);
    background:#08251a; min-height:100vh; -webkit-font-smoothing:antialiased; overflow-x:hidden;
  }
  .wrap{ max-width:1080px; margin:0 auto; padding:0 20px; }

  /* ── animated gradient background (fixed) ── */
  .bg-anim{ position:fixed; inset:-20% -20% -20% -20%; z-index:-3;
    background:
      radial-gradient(1100px 600px at 80% 0%,rgba(76,167,113,.22),transparent 60%),
      radial-gradient(900px 650px at 0% 100%,rgba(13,61,40,.55),transparent 55%),
      linear-gradient(135deg,#072018 0%,#0c3623 38%,#0a2e20 70%,#103d28 100%);
    background-size:160% 160%; animation:bgShift 22s ease infinite; }
  @keyframes bgShift{ 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }

  /* ── mouse-follow glow ── */
  #glow{ position:fixed; width:600px; height:600px; left:0; top:0; z-index:-2; pointer-events:none;
    background:radial-gradient(circle,rgba(120,210,150,.16),transparent 62%); transform:translate(-50%,-50%); opacity:0; transition:opacity .5s ease; }

  /* ── floating leaves + particles layers ── */
  #leaves,#particles{ position:fixed; inset:0; z-index:-1; pointer-events:none; overflow:hidden; }
  .lf{ position:absolute; top:-8%; will-change:transform; opacity:.0; }
  @keyframes fall{ 0%{ transform:translateY(-10vh) translateX(0) rotate(0deg); opacity:0 }
    8%{ opacity:.85 } 92%{ opacity:.85 }
    100%{ transform:translateY(112vh) translateX(var(--drift)) rotate(var(--spin)); opacity:0 } }
  .pt{ position:absolute; bottom:-5%; width:5px; height:5px; border-radius:50%; background:rgba(170,230,190,.5); will-change:transform; }
  @keyframes rise{ 0%{ transform:translateY(0) translateX(0); opacity:0 }
    12%{ opacity:.7 } 88%{ opacity:.7 }
    100%{ transform:translateY(-110vh) translateX(var(--drift)); opacity:0 } }

  /* ── premium loader (growing tree) ── */
  #loader{ position:fixed; inset:0; z-index:100; display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:linear-gradient(160deg,#072018,#0d3a26); transition:opacity .8s ease, visibility .8s ease; }
  #loader.done{ opacity:0; visibility:hidden; }
  .seedling{ position:relative; width:120px; height:130px; }
  .seedling .ground{ position:absolute; left:50%; bottom:0; width:74px; height:8px; border-radius:50%; background:rgba(134,201,154,.25); transform:translateX(-50%); }
  .seedling .stem{ position:absolute; left:50%; bottom:6px; width:5px; height:74px; border-radius:4px; background:linear-gradient(180deg,#5fae7c,#2f7d4f); transform:translateX(-50%) scaleY(0); transform-origin:bottom; animation:grow 1s cubic-bezier(.2,.8,.2,1) .15s forwards; }
  .seedling .canopy{ position:absolute; left:50%; top:6px; width:60px; height:60px; border-radius:50% 50% 48% 52%; background:radial-gradient(circle at 35% 30%,#86c99a,#3c8c5d); transform:translateX(-50%) scale(0); transform-origin:center bottom; animation:pop .7s cubic-bezier(.2,.9,.2,1.2) .95s forwards; box-shadow:0 8px 26px rgba(20,80,50,.5); }
  .seedling .lf2{ position:absolute; width:26px; height:18px; border-radius:0 100% 0 100%; background:#67b487; transform:scale(0); }
  .seedling .lf2.l{ left:24px; top:54px; transform-origin:right center; rotate:18deg; animation:pop .55s ease .7s forwards; }
  .seedling .lf2.r{ right:24px; top:46px; border-radius:100% 0 100% 0; transform-origin:left center; rotate:-18deg; animation:pop .55s ease .82s forwards; }
  @keyframes grow{ to{ transform:translateX(-50%) scaleY(1) } }
  @keyframes pop{ 0%{ transform:scale(0) } 70%{ transform:scale(1.08) } 100%{ transform:scale(1) } }
  #loader .lbrand{ margin-top:26px; opacity:0; animation:fadeUp .8s ease 1.15s forwards; text-align:center; }
  #loader .lbrand .logo{ font-size:24px; }
  #loader .lbrand .lt{ color:#9fd3b3; font-size:12px; letter-spacing:3px; text-transform:uppercase; margin-top:8px; }
  #loader .bar{ width:160px; height:3px; background:rgba(255,255,255,.12); border-radius:99px; overflow:hidden; margin-top:20px; }
  #loader .bar i{ display:block; height:100%; width:0; background:linear-gradient(90deg,#86c99a,#4ca771); border-radius:99px; animation:load 2s ease .1s forwards; }
  @keyframes load{ to{ width:100% } }

  /* wordmark with red dots on the two i's */
  .logo{ font-family:'Fraunces',serif; font-weight:700; letter-spacing:.5px; color:#fff; display:inline-block; }
  .logo .i{ position:relative; }
  .logo .i::after{ content:''; position:absolute; left:50%; top:.04em; width:.18em; height:.18em; background:var(--red); border-radius:50%; transform:translateX(-50%); }

  /* ── reveal util ── */
  .reveal{ opacity:0; transform:translateY(26px); transition:opacity .7s cubic-bezier(.2,.8,.2,1), transform .7s cubic-bezier(.2,.8,.2,1); }
  .reveal.in{ opacity:1; transform:none; }

  header.top{ padding:26px 0 8px; text-align:center; }
  .top .logo{ font-size:30px; }
  .top .seal{ display:inline-flex; align-items:center; gap:8px; margin-top:14px; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.16); color:#dff0e6; font-size:12px; font-weight:600; letter-spacing:1px; text-transform:uppercase; padding:6px 15px; border-radius:99px; backdrop-filter:blur(8px); }

  .hero{ text-align:center; padding:30px 0 26px; }
  .hero h1{ font-family:'Fraunces',serif; font-weight:600; color:#fff; font-size:clamp(30px,5vw,52px); line-height:1.08; letter-spacing:-.5px; }
  .hero h1 em{ font-style:italic; color:var(--leaf2); }
  .hero p{ color:#b9d3c4; max-width:560px; margin:16px auto 0; font-size:15.5px; line-height:1.6; }
  .stats{ display:flex; justify-content:center; gap:14px; flex-wrap:wrap; margin-top:26px; }
  .stat{ background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.15); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); border-radius:16px; padding:14px 22px; min-width:128px; }
  .stat .n{ font-family:'Fraunces',serif; font-size:28px; font-weight:700; color:#fff; line-height:1; }
  .stat .l{ font-size:11.5px; color:#a7c4b4; font-weight:600; margin-top:6px; letter-spacing:.3px; }

  .grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:18px; padding:34px 0 10px; }

  /* glassmorphism tree cards + gentle float */
  .card-slot{ /* reveal handled by .reveal */ }
  .card{ position:relative; display:block; text-decoration:none; color:#eaf3ec; border-radius:20px; padding:18px; overflow:hidden;
    background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.16);
    backdrop-filter:blur(16px) saturate(120%); -webkit-backdrop-filter:blur(16px) saturate(120%);
    box-shadow:0 14px 40px rgba(4,18,12,.34);
    animation:floatY var(--fd,7s) ease-in-out var(--fdl,0s) infinite; }
  @keyframes floatY{ 0%,100%{ transform:translateY(0) } 50%{ transform:translateY(-7px) } }
  .card::before{ content:''; position:absolute; left:0; top:0; bottom:0; width:5px; background:linear-gradient(180deg,#86c99a,#4ca771); }
  .card-in{ transition:transform .3s ease; }
  .card:hover{ border-color:rgba(134,201,154,.5); box-shadow:0 26px 60px rgba(0,0,0,.45); }
  .card:hover .card-in{ transform:translateY(-6px) scale(1.012); }
  .card .tag{ position:absolute; top:14px; right:14px; font-family:'Fraunces',serif; font-weight:700; font-size:12px; color:#fff; background:rgba(255,255,255,.16); border:1px solid rgba(255,255,255,.22); padding:3px 9px; border-radius:8px; letter-spacing:.5px; }
  .card .leaf{ font-size:26px; }
  .card .en{ font-family:'Fraunces',serif; font-weight:600; font-size:21px; color:#fff; margin-top:12px; line-height:1.1; }
  .card .pa{ font-family:'Noto Sans Gurmukhi',sans-serif; font-weight:500; font-size:15px; color:#9fe0b7; margin-top:4px; }
  .card .bot{ font-size:12px; font-style:italic; color:#bcd2c4; margin-top:6px; }
  .card .go{ margin-top:14px; font-size:12px; font-weight:700; color:#cdeed8; display:flex; align-items:center; gap:5px; }
  .card .go .dot{ width:7px; height:7px; border-radius:50%; background:var(--gold); box-shadow:0 0 0 0 rgba(217,164,65,.6); animation:gp 2.4s infinite; }
  @keyframes gp{ 0%{box-shadow:0 0 0 0 rgba(217,164,65,.55)} 70%{box-shadow:0 0 0 6px rgba(217,164,65,0)} 100%{box-shadow:0 0 0 0 rgba(217,164,65,0)} }

  /* ── DETAIL ── */
  .detail{ padding:18px 0 30px; }
  .back{ display:inline-flex; align-items:center; gap:7px; color:#cfe6d8; font-size:13px; font-weight:600; text-decoration:none; padding:8px 0; transition:color .2s; }
  .back:hover{ color:#fff; }
  .sheet{ background:var(--paper); border-radius:22px; overflow:hidden; box-shadow:0 30px 70px rgba(4,20,12,.5); margin-top:10px; }
  .sheet .band{ padding:26px 26px 22px; background:linear-gradient(135deg,var(--green),#155138); color:#fff; position:relative; overflow:hidden; }
  .sheet .band::after{ content:''; position:absolute; right:-40px; top:-40px; width:160px; height:160px; border-radius:50%; background:radial-gradient(circle,rgba(134,201,154,.35),transparent 65%); }
  .sheet .band .tag{ position:absolute; top:22px; right:24px; font-family:'Fraunces',serif; font-weight:700; font-size:13px; background:rgba(255,255,255,.15); border:1px solid rgba(255,255,255,.25); padding:5px 12px; border-radius:9px; letter-spacing:1px; z-index:2; }
  .sheet .band .leaf{ font-size:40px; position:relative; z-index:2; display:inline-block; animation:floatY 5s ease-in-out infinite; }
  .sheet .band h2{ font-family:'Fraunces',serif; font-weight:600; font-size:32px; line-height:1.05; margin-top:10px; position:relative; z-index:2; }
  .sheet .band .pa{ font-family:'Noto Sans Gurmukhi',sans-serif; font-weight:700; font-size:19px; color:#bfe6cf; margin-top:6px; position:relative; z-index:2; }
  .sheet .band .bot{ font-style:italic; font-size:13.5px; color:#dcefe3; opacity:.85; margin-top:5px; position:relative; z-index:2; }
  .body{ padding:24px 26px 8px; }
  .sec{ margin-bottom:22px; }
  .sec h3{ font-size:12px; font-weight:700; letter-spacing:1.2px; text-transform:uppercase; color:var(--leaf); margin-bottom:10px; }
  .about{ font-size:15px; line-height:1.65; color:#2c4438; }
  .data{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .field{ background:#eef3ee; border:1px solid #e0e8e0; border-radius:12px; padding:11px 13px; transition:transform .2s ease, box-shadow .2s ease; }
  .field:hover{ transform:translateY(-2px); box-shadow:0 6px 16px rgba(0,0,0,.07); }
  .field .k{ font-size:11px; font-weight:700; color:var(--muted); letter-spacing:.3px; text-transform:uppercase; }
  .field .v{ font-size:15px; font-weight:600; color:var(--ink); margin-top:4px; font-family:'Fraunces',serif; }
  .pending{ display:inline-flex; align-items:center; gap:6px; font-size:12.5px; font-weight:600; color:#9a7a1e; font-family:'Inter',sans-serif; }
  .pending::before{ content:''; width:7px; height:7px; border-radius:50%; background:var(--gold); }
  .chips{ display:flex; flex-wrap:wrap; gap:8px; }
  .chip{ background:#e7f2ea; color:#1c5a3b; font-size:12.5px; font-weight:600; padding:6px 12px; border-radius:99px; border:1px solid #d2e7d9; transition:transform .2s ease, background .2s ease; }
  .chip:hover{ transform:translateY(-2px); background:#d9efe0; }
  .fun{ background:linear-gradient(135deg,#fbf3df,#f7eccf); border:1px solid #efe0b8; border-radius:14px; padding:15px 16px; display:flex; gap:11px; }
  .fun .b{ font-size:20px; }
  .fun .t{ font-size:14px; line-height:1.55; color:#5c4a17; }
  .qrbox{ text-align:center; background:#eef3ee; border:1px dashed #b9cdbf; border-radius:16px; padding:20px; }
  .qrbox #qr{ display:inline-block; background:#fff; padding:10px; border-radius:12px; box-shadow:0 4px 14px rgba(0,0,0,.08); }
  .qrbox #qr img,.qrbox #qr canvas{ display:block; }
  .qrbox .cap{ font-size:12.5px; color:var(--muted); margin-top:12px; line-height:1.5; }
  .qrbox .cap b{ color:var(--ink); }

  footer{ text-align:center; padding:26px 0 34px; color:#9bbcab; font-size:12px; line-height:1.8; }
  footer .logo{ font-size:15px; }
  footer .cr{ margin-top:8px; letter-spacing:.4px; }

  @media(max-width:480px){
    .data{ grid-template-columns:1fr; }
    .sheet .band h2{ font-size:27px; }
    .stat{ min-width:calc(50% - 7px); }
  }
  @media(prefers-reduced-motion:reduce){
    .bg-anim,.card,.sheet .band .leaf,.card .go .dot{ animation:none !important; }
    .reveal{ opacity:1 !important; transform:none !important; }
    #glow,#leaves,#particles{ display:none !important; }
    #loader{ display:none !important; }
  }
</style>
</head>
<body>

<div id="loader">
  <div class="seedling">
    <div class="canopy"></div>
    <div class="lf2 l"></div>
    <div class="lf2 r"></div>
    <div class="stem"></div>
    <div class="ground"></div>
  </div>
  <div class="lbrand">
    <span class="logo"><span class="i">i</span>NV<span class="i">i</span>CTUS</span>
    <div class="lt">Green Census</div>
    <div class="bar"><i></i></div>
  </div>
</div>

<div class="bg-anim"></div>
<div id="glow"></div>
<div id="leaves"></div>
<div id="particles"></div>

<div id="app"></div>

<script>
const TREES = [
  { id:1,  tag:"001", en:"Neem",        pa:"ਨਿੰਮ",        bot:"Azadirachta indica",  leaf:"🌿",
    about:"A hardy evergreen known across India as the 'village pharmacy'. Its bitter leaves and oil have been used in medicine and natural pest control for centuries.",
    benefits:["Air purifier","Natural pesticide","Medicinal leaves","Dense shade"],
    fun:"A single neem can cool the air around it by several degrees on a hot Punjab afternoon." },
  { id:2,  tag:"002", en:"Peepal",      pa:"ਪਿੱਪਲ",       bot:"Ficus religiosa",     leaf:"🍃",
    about:"The sacred fig, with heart-shaped leaves that flutter in the lightest breeze. Famous for releasing oxygen even at night.",
    benefits:["Oxygen at night","Sacred & cultural","Supports birds","Very long-lived"],
    fun:"Peepal leaves have a long 'drip tip' that helps rainwater run off quickly." },
  { id:3,  tag:"003", en:"Banyan",      pa:"ਬੋਹੜ",        bot:"Ficus benghalensis",  leaf:"🌳",
    about:"India's national tree. It spreads on aerial roots that thicken into new trunks, so one tree can grow into a small forest.",
    benefits:["Massive shade","Wildlife habitat","Soil binding","Iconic canopy"],
    fun:"Some banyans cover more ground than a football field thanks to their hanging roots." },
  { id:4,  tag:"004", en:"Sheesham",    pa:"ਟਾਹਲੀ",       bot:"Dalbergia sissoo",    leaf:"🌲",
    about:"Punjab's state tree (Tahli). A fast-growing hardwood prized for strong, beautiful timber and its role in farm windbreaks.",
    benefits:["State tree of Punjab","Quality timber","Enriches soil","Windbreak"],
    fun:"Tahli wood is so durable it's a favourite for traditional Punjabi furniture and doors." },
  { id:5,  tag:"005", en:"Amaltas",     pa:"ਅਮਲਤਾਸ",      bot:"Cassia fistula",      leaf:"🌼",
    about:"The 'golden shower' tree, draped in cascading yellow blossoms through summer — a burst of colour on any campus.",
    benefits:["Stunning blooms","Pollinator-friendly","Light shade","Ornamental"],
    fun:"Amaltas blooms brightest in the peak of summer heat." },
  { id:6,  tag:"006", en:"Gulmohar",    pa:"ਗੁਲਮੋਹਰ",     bot:"Delonix regia",       leaf:"🌺",
    about:"The flame tree, crowned with brilliant red-orange flowers in summer and feathery, fern-like leaves.",
    benefits:["Vivid flowers","Wide shade","Fast-growing","Ornamental"],
    fun:"Its fern-like leaves fold up gently as evening falls." },
  { id:7,  tag:"007", en:"Ashoka",      pa:"ਅਸ਼ੋਕ",       bot:"Polyalthia longifolia",leaf:"🌴",
    about:"The tall, slender 'mast tree' often lined along driveways. Its glossy drooping leaves give a graceful, columnar look.",
    benefits:["Wind buffer","Evergreen screen","Dust filter","Ornamental"],
    fun:"Ashoka means 'without sorrow' in Sanskrit." },
  { id:8,  tag:"008", en:"Mango",       pa:"ਅੰਬ",         bot:"Mangifera indica",    leaf:"🥭",
    about:"The beloved 'king of fruits'. A broad, shady evergreen that bursts into fragrant blossom before fruiting in summer.",
    benefits:["Edible fruit","Dense shade","Blossoms for bees","Long-lived"],
    fun:"A mango tree can keep fruiting for over 100 years." },
  { id:9,  tag:"009", en:"Jamun",       pa:"ਜਾਮਣ",        bot:"Syzygium cumini",     leaf:"🫐",
    about:"Also called black plum. A robust evergreen that drops sweet-tart purple berries in the monsoon.",
    benefits:["Edible berries","Dense canopy","Bird-friendly","Medicinal seeds"],
    fun:"Jamun fruit stains the tongue a bright purple — a monsoon favourite." },
  { id:10, tag:"010", en:"Guava",       pa:"ਅਮਰੂਦ",       bot:"Psidium guajava",     leaf:"🍐",
    about:"A small, friendly fruit tree with smooth bark and crisp, vitamin-C-rich fruit loved straight off the branch.",
    benefits:["Vitamin-C fruit","Easy to grow","Attracts birds","Compact size"],
    fun:"Guava has more vitamin C than an orange, gram for gram." },
  { id:11, tag:"011", en:"Eucalyptus",  pa:"ਸਫ਼ੈਦਾ",       bot:"Eucalyptus globulus", leaf:"🌿",
    about:"The tall, aromatic 'safeda' with peeling bark and a fresh, minty scent from its oil-rich leaves.",
    benefits:["Aromatic oil","Fast-growing","Tall windbreak","Fresh scent"],
    fun:"Crush a eucalyptus leaf and you'll smell the same oil used in cough balms." },
  { id:12, tag:"012", en:"Kachnar",     pa:"ਕਚਨਾਰ",       bot:"Bauhinia variegata",  leaf:"🌸",
    about:"The 'orchid tree', with twin-lobed butterfly-shaped leaves and pink-purple orchid-like flowers.",
    benefits:["Beautiful blooms","Edible buds","Pollinator-friendly","Medicinal bark"],
    fun:"Kachnar flower buds are cooked into a popular Punjabi vegetable dish." },
  { id:13, tag:"013", en:"Arjun",       pa:"ਅਰਜੁਨ",       bot:"Terminalia arjuna",   leaf:"🌳",
    about:"A large, shady tree with pale, smooth bark long valued in traditional heart-health remedies.",
    benefits:["Medicinal bark","Soil stabiliser","Wide shade","Wildlife host"],
    fun:"Arjun is a host tree for the silk-producing 'tasar' moth." },
  { id:14, tag:"014", en:"Bottlebrush", pa:"ਬੋਤਲਬੁਰਸ਼",   bot:"Callistemon viminalis",leaf:"🌺",
    about:"A graceful ornamental with weeping branches and bright red flower spikes shaped exactly like a bottle brush.",
    benefits:["Bird & bee magnet","Year-round colour","Compact","Ornamental"],
    fun:"Its flower spikes are hundreds of tiny red stamens, not petals." }
];

const SURVEY_FIELDS = ["Campus Location","Approx. Height","Planted Year","Canopy Spread","Estimated Age","Photo on Record"];
const wordmark = '<span class="logo"><span class="i">i</span>NV<span class="i">i</span>CTUS</span>';
function el(id){ return document.getElementById(id); }
const REDUCED = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

function renderHome(){
  const cards = TAGGED.map(function(t, i){
    const meta = SPECIES[t.name] || {pa:'', leaf:'🌳'};
    const bot = t.bot ? t.bot : '&nbsp;';
    return '\
    <div class="card-slot reveal">\
      <a class="card" href="#tree/'+t.tag+'" style="--fd:'+(6+(i%4))+'s; --fdl:'+((i%5)*0.4)+'s;">\
        <div class="card-in">\
          <span class="tag">#'+t.tag+'</span>\
          <div class="leaf">'+meta.leaf+'</div>\
          <div class="en">'+t.name+'</div>\
          <div class="pa">'+meta.pa+'</div>\
          <div class="bot">'+bot+'</div>\
          <div class="go"><span class="dot"></span> Tap to explore</div>\
        </div>\
      </a>\
    </div>'; }).join("");

  const speciesCount = TAGGED.reduce(function(a,t){ if(a.indexOf(t.name)<0) a.push(t.name); return a; }, []).length;

  el('app').innerHTML =
    '<header class="top"><div class="wrap"><div class="reveal">'+wordmark+'<div><span class="seal">🌳 Green Census</span></div></div></div></header>'+
    '<section class="hero"><div class="wrap">'+
      '<h1 class="reveal">Our campus is a <em>living classroom</em></h1>'+
      '<p class="reveal">Every tagged tree tells its own story. Scan a tag on campus — or tap a card below — to meet the trees that share our school.</p>'+
      '<div class="stats reveal">'+
        '<div class="stat"><div class="n" data-count="'+TAGGED.length+'">0</div><div class="l">TREES TAGGED</div></div>'+
        '<div class="stat"><div class="n" data-count="'+speciesCount+'">0</div><div class="l">SPECIES FOUND</div></div>'+
        '<div class="stat"><div class="n">QR</div><div class="l">SCAN TO LEARN</div></div>'+
      '</div></div></section>'+
    '<div class="wrap"><div class="grid">'+cards+'</div></div>'+
    '<footer class="reveal">'+wordmark+'<div class="cr">Invictus Green Census · A Campus Tree Trail</div><div class="cr">Designed &amp; Developed by Mohit Sood</div></footer>';
  enhance();
  window.scrollTo(0,0);
}

function renderTree(id){
  const t = TREES.find(function(x){ return x.id === id; });
  if(!t){ location.hash = ''; return; }

/* ── reveal + counters wiring for freshly rendered DOM ── */
let _io;
function enhance(){
  const items = Array.prototype.slice.call(document.querySelectorAll('.reveal:not(.in)'));
  if(REDUCED){ items.forEach(function(n){ n.classList.add('in'); }); runCounters(); return; }
  if(!_io){
    _io = new IntersectionObserver(function(entries){
      entries.forEach(function(e){ if(e.isIntersecting){ e.target.classList.add('in'); _io.unobserve(e.target); if(e.target.querySelector('[data-count]')) runCounters(); } });
    }, { threshold:0.18 });
  }
  // stagger cards by index
  let i=0;
  items.forEach(function(n){
    if(n.classList.contains('card-slot')){ n.style.transitionDelay = (i*55)+'ms'; i++; }
    _io.observe(n);
  });
  // counters in hero usually visible immediately
  setTimeout(runCounters, 150);
}

let _counted=false;
function runCounters(){
  document.querySelectorAll('[data-count]').forEach(function(node){
    if(node.dataset.done) return;
    const target = parseInt(node.dataset.count,10);
    const suffix = node.dataset.suffix || '';
    node.dataset.done = '1';
    if(REDUCED){ node.textContent = target+suffix; return; }
    const dur = 1100, t0 = performance.now();
    (function tick(now){
      const p = Math.min(1,(now-t0)/dur);
      const eased = 1-Math.pow(1-p,3);
      node.textContent = Math.round(target*eased)+suffix;
      if(p<1) requestAnimationFrame(tick);
    })(t0);
  });
}

/* ── global ambient effects (run once) ── */
function buildAmbient(){
  if(REDUCED) return;
  const isMobile = window.innerWidth < 640;
  // floating leaves
  const leafBox = el('leaves'), glyphs = ['🍃','🌿','🍂'];
  const leafCount = isMobile ? 6 : 11;
  for(let i=0;i<leafCount;i++){
    const s = document.createElement('div'); s.className='lf';
    const size = 14 + Math.random()*18;
    s.textContent = glyphs[i % glyphs.length];
    s.style.left = (Math.random()*100)+'vw';
    s.style.fontSize = size+'px';
    const dur = 14 + Math.random()*14;
    s.style.setProperty('--drift', (Math.random()*160-80)+'px');
    s.style.setProperty('--spin', (Math.random()*540-180)+'deg');
    s.style.animation = 'fall '+dur+'s linear '+(Math.random()*dur)+'s infinite';
    leafBox.appendChild(s);
  }
  // particles
  const ptBox = el('particles');
  const ptCount = isMobile ? 12 : 22;
  for(let i=0;i<ptCount;i++){
    const d = document.createElement('div'); d.className='pt';
    const sz = 3+Math.random()*4;
    d.style.left = (Math.random()*100)+'vw';
    d.style.width = d.style.height = sz+'px';
    const dur = 16 + Math.random()*16;
    d.style.setProperty('--drift',(Math.random()*120-60)+'px');
    d.style.animation = 'rise '+dur+'s linear '+(Math.random()*dur)+'s infinite';
    ptBox.appendChild(d);
  }
  // mouse-follow glow (pointer devices only)
  const glow = el('glow');
  if(window.matchMedia('(pointer:fine)').matches){
    let gx=window.innerWidth/2, gy=window.innerHeight/2, tx=gx, ty=gy;
    window.addEventListener('mousemove', function(e){ tx=e.clientX; ty=e.clientY; glow.style.opacity='1'; });
    (function loop(){ gx+=(tx-gx)*0.12; gy+=(ty-gy)*0.12; glow.style.transform='translate('+gx+'px,'+gy+'px) translate(-50%,-50%)'; requestAnimationFrame(loop); })();
  }
  // parallax on background + leaves
  let ticking=false;
  window.addEventListener('scroll', function(){
    if(ticking) return; ticking=true;
    requestAnimationFrame(function(){
      const y = window.scrollY;
      leafBox.style.transform = 'translateY('+(y*0.18)+'px)';
      ptBox.style.transform = 'translateY('+(y*0.08)+'px)';
      ticking=false;
    });
  }, { passive:true });
}
